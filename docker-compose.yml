version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: landjord-backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: landjord-frontend
    restart: unless-stopped
    ports:
      - "5821:443"
    depends_on:
      - backend
